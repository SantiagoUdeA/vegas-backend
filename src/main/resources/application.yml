spring:
  application:
    name: 'Sistema de gestión operativa integral - Grupo las vegas'
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: ${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
        jdbc:
          time_zone: America/Bogota
  jackson:
    time-zone: America/Bogota
    date-format: yyyy-MM-dd'T'HH:mm:ss

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_URI}
aws:
  region: ${COGNITO_REGION}
  cognito:
    userPoolId: ${COGNITO_USER_POOL_ID:us-east-1_mqoX49I0Z}
    clientId: ${COGNITO_CLIENT_ID}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
